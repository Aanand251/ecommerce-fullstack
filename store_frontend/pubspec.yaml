name: store_frontend
description: Premium E-Commerce Flutter Web Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management - Riverpod (Modern)
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Routing - GoRouter for web-standard URLs
  go_router: ^13.0.0

  # Networking
  dio: ^5.4.0

  # Local Storage for JWT persistence
  shared_preferences: ^2.2.2

  # UI Components
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0

  # Utilities
  intl: ^0.19.0
  logger: ^2.0.2+1
  equatable: ^2.0.5

  # Icons
  cupertino_icons: ^1.0.6
  iconsax: ^0.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  # Note: Fonts are loaded via google_fonts package
  # Assets will be added as needed in later steps
